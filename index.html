<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Primary SEO -->
    <title>Estate Agents Bayswater W2 | Lettings & Sales | Uniqletts</title>
    <meta name="description" content="Independent estate and letting agents in Bayswater, London W2. Serving Queensway, Hyde Park and surrounding areas for 15+ years. Free valuations available." />
    <link rel="canonical" href="https://www.uniqletts.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Estate Agents Bayswater W2 | Uniqletts" />
    <meta property="og:description" content="Independent letting and estate agents in Bayswater W2. Personal service, 15+ years local expertise." />
    <meta property="og:url" content="https://www.uniqletts.com/" />
    <meta property="og:image" content="https://www.uniqletts.com/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />

    <!-- Performance: preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Font strategy — Nunito Sans only:
      - Matches the logo's rounded, geometric sans-serif character
      - 300 (light body) · 400 (regular body) · 600 (nav, labels, UI)
        · 700 (headings) · 800 (hero h1, display sizes)
      - Variable font axis used so a single file covers all weights
      - display=swap ensures text is visible immediately during load
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700;6..12,800&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD LocalBusiness schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "Uniqletts",
      "description": "Independent letting and estate agents in Bayswater, London W2",
      "url": "https://www.uniqletts.com",
      "telephone": "+442035442456",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Suite 14, 23 Redan Place",
        "addressLocality": "Bayswater",
        "addressRegion": "London",
        "postalCode": "W2 4SA",
        "addressCountry": "GB"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 51.5118,
        "longitude": -0.1872
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
          "opens": "09:00",
          "closes": "18:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Saturday",
          "opens": "10:00",
          "closes": "16:00"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "34"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
